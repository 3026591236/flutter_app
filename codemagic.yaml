workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          flutter packages pub get
      - name: Build iOS project
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
